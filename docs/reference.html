<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>煖意專屬選香師｜Honoka</title>
    <style>
        :root {
            --bg-light: #F9F7F3; /* 燕麥白 */
            --card-bg: #FFFFFF; 
            --text-main: #4A4238; 
            --text-sub: #8C8273; 
            --gold-main: #CFA972; 
            --gold-light: #EBE1D1; /* 顧客左側淡金色 */
            --pink-light: #FCE8E6; /* Honoka 右側淺粉色 */
            --pink-main: #D1A3A4; 
            --shadow-soft: 0 4px 15px rgba(74, 66, 56, 0.05);
            /* 浮雕按鈕陰影 */
            --neu-shadow-dark: rgba(74, 66, 56, 0.08);
            --neu-shadow-light: rgba(255, 255, 255, 0.9);
        }

        body {
            margin: 0; padding: 20px; background-color: #EAE6DF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text-main); display: flex; justify-content: center;
            height: 100vh; box-sizing: border-box;
        }

        /* 主容器 */
        .app-container {
            width: 100%; max-width: 400px; background-color: var(--bg-light);
            display: flex; flex-direction: column;
            box-sizing: border-box; position: relative; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            border-radius: 32px; overflow: hidden;
        }

        /* 💡 推薦：木漏れ日 (植物光影) 背景疊加層 */
        .ambient-bg {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(207,169,114,0.05) 0%, transparent 50%);
            pointer-events: none; z-index: 1;
        }

        /* 頂部導覽列 */
        .nav-bar {
            display: flex; align-items: center; padding: 24px 20px 16px;
            background-color: rgba(249, 247, 243, 0.85); backdrop-filter: blur(12px);
            z-index: 10; border-bottom: 1px solid rgba(240, 235, 225, 0.5);
        }
        .back-btn { font-size: 16px; color: var(--gold-main); text-decoration: none; margin-right: 16px; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; background: #FFF; box-shadow: var(--shadow-soft); }
        .page-title { font-size: 15px; font-weight: 500; color: var(--text-main); margin: 0; letter-spacing: 2px; }

        /* 對話滾動區域 */
        .scroll-area {
            flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth;
            position: relative; z-index: 2;
        }
        .scroll-area::-webkit-scrollbar { width: 0px; }

        .hero-section { text-align: center; margin-bottom: 32px; padding-top: 8px; }
        .hero-section h2 { font-size: 18px; color: var(--gold-main); margin: 0 0 8px 0; font-weight: 500; letter-spacing: 1.5px; }
        .hero-section p { font-size: 12px; color: var(--text-sub); margin: 0; line-height: 1.6; letter-spacing: 0.5px; }

        /* --- 💡 推薦：浮動淡入動畫 --- */
        @keyframes floatIn {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-container { display: flex; flex-direction: column; gap: 28px; }
        .chat-row { display: flex; flex-direction: column; width: 100%; animation: floatIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        
        .chat-row.agent { align-items: flex-start; }
        .chat-row.user { align-items: flex-end; }

        /* 署名標題列 */
        .step-title { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 500; margin-bottom: 8px; letter-spacing: 0.8px; text-transform: uppercase; }
        .chat-row.agent .step-title { color: var(--pink-main); }
        .chat-row.user .step-title { color: var(--gold-main); flex-direction: row-reverse; }

        .title-dot { width: 6px; height: 6px; border-radius: 50%; }
        .chat-row.agent .title-dot { background-color: var(--pink-light); }
        .chat-row.user .title-dot { background-color: var(--gold-light); }

        /* --- 共同卡片樣式 (白底) --- */
        .memory-card {
            background-color: var(--card-bg); border-radius: 12px;
            box-shadow: var(--shadow-soft);
            position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 8px;
            max-width: 85%; border: 1px solid rgba(240, 235, 225, 0.4);
        }
        
        .scent-color-bar { position: absolute; top: 0; bottom: 0; width: 4px; }
        
        /* Agent: Honoka (左側對話，右側粉色條) */
        .agent-card { padding: 16px 20px 16px 16px; }
        .bar-agent { right: 0; background-color: var(--pink-light); } 
        
        /* User: 顧客 (右側對話，左側金色條) */
        .user-card { padding: 16px 16px 16px 20px; }
        .bar-user { left: 0; background-color: var(--gold-light); }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px;}
        .memory-card h4 { margin: 0; font-size: 15px; color: var(--text-main); font-weight: 500; letter-spacing: 0.5px;}
        .advisor-tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; border: 1px solid var(--pink-light); color: var(--pink-main); background-color: #FFF; }
        .memory-card p { margin: 0; font-size: 13px; color: var(--text-sub); line-height: 1.7; }

        /* --- 💡 推薦：日系浮雕式按鈕 (Neumorphism) --- */
        .options-group { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; }
        .option-btn {
            background: var(--bg-light); 
            border: none;
            color: var(--text-main); 
            padding: 10px 16px; 
            border-radius: 12px;
            font-size: 12px; 
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 4px 4px 10px var(--neu-shadow-dark), -4px -4px 10px var(--neu-shadow-light);
            font-family: inherit;
            letter-spacing: 0.5px;
        }
        .option-btn:hover {
            box-shadow: inset 2px 2px 5px var(--neu-shadow-dark), inset -2px -2px 5px var(--neu-shadow-light);
            color: var(--pink-main);
            transform: scale(0.98);
        }

        /* 底部輸入區 */
        .input-area {
            padding: 20px; background-color: var(--card-bg);
            border-top: 1px solid var(--border-soft);
            display: flex; gap: 12px; align-items: center; z-index: 10;
        }
        .input-area input {
            flex: 1; padding: 14px 18px;
            border: none; border-radius: 15px;
            outline: none; font-size: 13px; color: var(--text-main);
            background: var(--bg-light);
            box-shadow: inset 2px 2px 5px var(--neu-shadow-dark), inset -2px -2px 5px var(--neu-shadow-light);
        }
        
        .send-btn {
            background: var(--bg-light); border: none; cursor: pointer;
            color: var(--gold-main); display: flex; align-items: center; justify-content: center;
            width: 44px; height: 44px; border-radius: 12px;
            box-shadow: 4px 4px 10px var(--neu-shadow-dark), -4px -4px 10px var(--neu-shadow-light);
            transition: 0.3s;
        }
        .send-btn:hover { transform: translateY(-2px); color: var(--pink-main); }

        .end-mark { text-align: center; color: var(--gold-light); font-size: 20px; margin-top: 12px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="ambient-bg"></div>
        
        <div class="nav-bar">
            <a href="#" class="back-btn">❮</a>
            <h1 class="page-title">選香服務</h1>
        </div>

        <div class="scroll-area" id="scrollArea">
            <div class="hero-section">
                <h2>煖意 ‧ 您的專屬顧問</h2>
                <p>靜心聆聽，為您尋覓契合靈魂的香氣</p>
            </div>

            <div class="chat-container" id="chatTimeline">
                
                <div class="chat-row agent">
                    <div class="step-title">
                        <div class="title-dot"></div>
                        <span>煖意專屬選香師｜Honoka</span>
                    </div>
                    
                    <div class="memory-card agent-card">
                        <div class="scent-color-bar bar-agent"></div>
                        <div class="card-header">
                            <h4>不知道這個月該選哪一款嗎？</h4>
                            <div class="advisor-tag">專屬選香師</div>
                        </div>
                        <p>不管是『最近的心情』（例如：需要專注、想好好睡一覺），還是『偏好的氣味』（例如：喜歡沉穩木質、想找清新果香），請用簡單的幾個字告訴我。<br><br>我會分析您的狀態與喜好，精準匹配出最適合您的氣味。</p>
                        
                        <div class="options-group" id="optionsGroup1">
                            <button class="option-btn" onclick="selectOption('🧘‍♀️ 需要專注', '我最近需要高度專注來完成工作。')">需要專注</button>
                            <button class="option-btn" onclick="selectOption('🌙 想要好眠', '最近有些疲憊，希望能有一款讓我好好放鬆入睡的香氣。')">想要好眠</button>
                            <button class="option-btn" onclick="selectOption('🌲 木質調', '我個人比較偏好低調、沉穩的木質調。')">沉穩木質</button>
                        </div>
                    </div>
                </div>

            </div>
            
            <div class="end-mark" id="endMark" style="display:none;">❦</div>
        </div>

        <div class="input-area">
            <input type="text" placeholder="告訴 Honoka 您的心情...">
            <button class="send-btn" type="button">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        function selectOption(title, text) {
            document.getElementById('optionsGroup1').style.display = 'none';
