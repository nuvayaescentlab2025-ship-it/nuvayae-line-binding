<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>煖意專屬選香師｜Honoka</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-light: #F9F7F3;
            --card-bg: #FFFFFF;
            --text-main: #4A4238;
            --text-sub: #8C8273;
            --gold-main: #be9f74;
            --gold-light: #EBE1D1;
            --pink-light: #FCE8E6;
            --pink-main: #D1A3A4;
            --shadow-soft: 0 4px 15px rgba(74, 66, 56, 0.05);
            --neu-shadow-dark: rgba(74, 66, 56, 0.08);
            --neu-shadow-light: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background-color: #EAE6DF;
            font-family: 'Noto Serif TC', 'PingFang TC', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-main);
            display: flex; justify-content: center;
            height: 100vh; height: 100dvh;
        }

        .app-container {
            width: 100%; max-width: 440px; background-color: var(--bg-light);
            display: flex; flex-direction: column;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            overflow: hidden;
        }

        @media (min-width: 480px) {
            body { padding: 20px; }
            .app-container { border-radius: 32px; height: calc(100vh - 40px); }
        }

        .ambient-bg {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(207,169,114,0.05) 0%, transparent 50%);
            pointer-events: none; z-index: 1;
        }

        /* 頂部導覽列 */
        .nav-bar {
            display: flex; align-items: center; padding: 20px 16px 14px;
            background-color: rgba(249, 247, 243, 0.85); backdrop-filter: blur(12px);
            z-index: 10; border-bottom: 1px solid rgba(240, 235, 225, 0.5);
            gap: 12px;
        }
        .back-btn {
            font-size: 14px; color: var(--gold-main); text-decoration: none;
            display: flex; align-items: center; justify-content: center;
            width: 32px; height: 32px; border-radius: 50%;
            background: #FFF; box-shadow: var(--shadow-soft);
            border: none; cursor: pointer;
        }
        .page-title { font-size: 14px; font-weight: 400; color: var(--text-main); margin: 0; letter-spacing: 2px; flex: 1; }

        /* 進度指示 */
        .progress-bar-wrap {
            display: flex; align-items: center; gap: 6px;
            padding: 10px 16px; background: rgba(249,247,243,0.6);
            border-bottom: 1px solid rgba(240,235,225,0.3);
            z-index: 10;
        }
        .slot-indicator {
            display: flex; align-items: center; gap: 4px;
            font-size: 10px; color: var(--text-sub); letter-spacing: 0.5px;
        }
        .slot-dot {
            width: 8px; height: 8px; border-radius: 50%;
            border: 1.5px solid rgba(190,159,116,0.35);
            background: transparent; transition: all 0.3s;
        }
        .slot-dot.filled {
            background: var(--gold-main); border-color: var(--gold-main);
            box-shadow: 0 0 4px rgba(190,159,116,0.4);
        }

        /* 對話滾動區域 */
        .scroll-area {
            flex: 1; overflow-y: auto; padding: 20px 16px;
            scroll-behavior: smooth; position: relative; z-index: 2;
        }
        .scroll-area::-webkit-scrollbar { width: 0; }

        .hero-section { text-align: center; margin-bottom: 24px; padding-top: 4px; }
        .hero-section h2 { font-size: 17px; color: var(--gold-main); margin: 0 0 6px; font-weight: 400; letter-spacing: 1.5px; }
        .hero-section p { font-size: 11px; color: var(--text-sub); margin: 0; line-height: 1.6; letter-spacing: 0.5px; }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-container { display: flex; flex-direction: column; gap: 20px; }

        .chat-row {
            display: flex; flex-direction: column; width: 100%;
            animation: floatIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .chat-row.agent { align-items: flex-start; }
        .chat-row.user { align-items: flex-end; }

        .step-title {
            display: flex; align-items: center; gap: 6px;
            font-size: 10px; font-weight: 400; margin-bottom: 6px;
            letter-spacing: 0.8px;
        }
        .chat-row.agent .step-title { color: var(--pink-main); }
        .chat-row.user .step-title { color: var(--gold-main); flex-direction: row-reverse; }

        .title-dot { width: 5px; height: 5px; border-radius: 50%; }
        .chat-row.agent .title-dot { background-color: var(--pink-light); }
        .chat-row.user .title-dot { background-color: var(--gold-light); }

        /* 卡片 */
        .memory-card {
            background-color: var(--card-bg); border-radius: 12px;
            box-shadow: var(--shadow-soft);
            position: relative; overflow: hidden;
            max-width: 88%; border: 1px solid rgba(240, 235, 225, 0.4);
        }

        .scent-color-bar { position: absolute; top: 0; bottom: 0; width: 3px; }
        .bar-agent { right: 0; background-color: var(--pink-light); }
        .bar-user { left: 0; background-color: var(--gold-light); }

        .agent-card { padding: 14px 18px 14px 14px; }
        .user-card { padding: 14px 14px 14px 18px; }

        .memory-card p {
            margin: 0; font-size: 13px; color: var(--text-sub);
            line-height: 1.75; white-space: pre-wrap;
        }

        /* 快速選項按鈕 */
        .options-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .option-btn {
            background: var(--bg-light); border: none;
            color: var(--text-main); padding: 8px 14px; border-radius: 10px;
            font-size: 12px; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 3px 3px 8px var(--neu-shadow-dark), -3px -3px 8px var(--neu-shadow-light);
            font-family: inherit; letter-spacing: 0.5px;
        }
        .option-btn:hover {
            box-shadow: inset 2px 2px 5px var(--neu-shadow-dark), inset -2px -2px 5px var(--neu-shadow-light);
            color: var(--pink-main); transform: scale(0.98);
        }

        /* 打字動畫 */
        .typing-indicator {
            display: flex; align-items: center; gap: 4px; padding: 4px 0;
        }
        .typing-indicator span {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--pink-main); opacity: 0.4;
            animation: typingBounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* 底部輸入區 */
        .input-area {
            padding: 14px 16px 20px; background-color: var(--card-bg);
            border-top: 1px solid rgba(240, 235, 225, 0.5);
            display: flex; gap: 10px; align-items: center; z-index: 10;
        }
        .input-area input {
            flex: 1; padding: 12px 16px; border: none; border-radius: 14px;
            outline: none; font-size: 13px; color: var(--text-main);
            background: var(--bg-light); font-family: inherit;
            box-shadow: inset 2px 2px 5px var(--neu-shadow-dark), inset -2px -2px 5px var(--neu-shadow-light);
        }
        .send-btn {
            background: var(--bg-light); border: none; cursor: pointer;
            color: var(--gold-main); display: flex; align-items: center; justify-content: center;
            width: 42px; height: 42px; border-radius: 12px;
            box-shadow: 3px 3px 8px var(--neu-shadow-dark), -3px -3px 8px var(--neu-shadow-light);
            transition: 0.3s; flex-shrink: 0;
        }
        .send-btn:hover { transform: translateY(-2px); color: var(--pink-main); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* 完成狀態 */
        .completed-banner {
            text-align: center; padding: 20px 16px;
            background: rgba(249,247,243,0.8);
            border-top: 1px solid rgba(240,235,225,0.5);
            z-index: 10;
        }
        .completed-banner p {
            font-size: 13px; color: var(--text-sub); margin: 0 0 12px; letter-spacing: 0.5px;
        }
        .restart-btn {
            background: var(--gold-main); border: none; color: #fff;
            padding: 10px 24px; border-radius: 10px; font-size: 13px;
            cursor: pointer; font-family: inherit; letter-spacing: 1px;
            transition: 0.3s;
        }
        .restart-btn:hover { opacity: 0.9; }

        .hidden { display: none !important; }
    </style>
  <script type="module" crossorigin src="./assets/advisor-Be0wz1Uw.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/modulepreload-polyfill-B5Qt9EMX.js">
</head>
<body>

<div class="app-container">
    <div class="ambient-bg"></div>

    <div class="nav-bar">
        <button class="back-btn" id="backBtn">&#10094;</button>
        <h1 class="page-title">專屬選香顧問</h1>
    </div>

    <!-- 槽位進度 -->
    <div class="progress-bar-wrap" id="slotProgress">
        <div class="slot-indicator"><div class="slot-dot" id="slot-space"></div>空間</div>
        <div class="slot-indicator"><div class="slot-dot" id="slot-mood"></div>心情</div>
        <div class="slot-indicator"><div class="slot-dot" id="slot-preferences"></div>香調</div>
        <div class="slot-indicator"><div class="slot-dot" id="slot-dislikes"></div>地雷</div>
        <div class="slot-indicator"><div class="slot-dot" id="slot-occasion"></div>場合</div>
        <div class="slot-indicator"><div class="slot-dot" id="slot-health_conditions"></div>健康</div>
    </div>

    <div class="scroll-area" id="scrollArea">
        <div class="hero-section">
            <h2>煖意 ‧ 專屬選香顧問</h2>
            <p>靜心聆聽，為您尋覓契合靈魂的香氣</p>
        </div>
        <div class="chat-container" id="chatTimeline"></div>
    </div>

    <!-- 輸入區（active 狀態） -->
    <div class="input-area" id="inputArea">
        <input type="text" id="msgInput" placeholder="告訴 Honoka 您的心情或偏好...">
        <button class="send-btn" id="sendBtn" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>

    <!-- 完成狀態 -->
    <div class="completed-banner hidden" id="completedBanner">
        <p>很高興能幫您找到屬於您的氣息 ✨</p>
        <button class="restart-btn" id="restartBtn">開始新的諮詢</button>
    </div>
</div>

</body>
</html>
