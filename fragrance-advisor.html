<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>煖意專屬選香師｜Honoka</title>
    <style>
        :root {
            --bg-light: #F9F7F3;
            --card-bg: #FFFFFF;
            --text-main: #4A4238;
            --text-sub: #8C8273;
            --gold-main: #CFA972;
            --gold-light: #EBE1D1;
            --pink-light: #FCE8E6;
            --pink-main: #D1A3A4;
            --shadow-soft: 0 4px 15px rgba(74, 66, 56, 0.05);
            --neu-shadow-dark: rgba(74, 66, 56, 0.08);
            --neu-shadow-light: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 20px;
            background-color: #EAE6DF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text-main);
            display: flex; justify-content: center;
            height: 100vh;
        }

        .app-container {
            width: 100%; max-width: 400px; background-color: var(--bg-light);
            display: flex; flex-direction: column;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            border-radius: 32px; overflow: hidden;
        }

        .ambient-bg {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(207,169,114,0.05) 0%, transparent 50%);
            pointer-events: none; z-index: 1;
        }

        /* 頂部導覽列 */
        .nav-bar {
            display: flex; align-items: center; padding: 24px 20px 16px;
            background-color: rgba(249, 247, 243, 0.85); backdrop-filter: blur(12px);
            z-index: 10; border-bottom: 1px solid rgba(240, 235, 225, 0.5);
        }
        .back-btn {
            font-size: 16px; color: var(--gold-main); text-decoration: none;
            display: flex; align-items: center; justify-content: center;
            width: 32px; height: 32px; border-radius: 50%;
            background: #FFF; box-shadow: var(--shadow-soft);
            border: none; cursor: pointer; margin-right: 16px;
        }
        .page-title { font-size: 15px; font-weight: 500; color: var(--text-main); margin: 0; letter-spacing: 2px; flex: 1; }

        /* 進度指示 */
        .progress-bar-wrap {
            display: flex; align-items: center; gap: 6px;
            padding: 10px 16px; background: rgba(249,247,243,0.6);
            border-bottom: 1px solid rgba(240,235,225,0.3);
            z-index: 10;
        }
        .slot-indicator {
            display: flex; align-items: center; gap: 4px;
            font-size: 10px; color: var(--text-sub); letter-spacing: 0.5px;
        }
        .slot-dot {
            width: 8px; height: 8px; border-radius: 50%;
            border: 1.5px solid rgba(207,169,114,0.35);
            background: transparent; transition: all 0.3s;
        }
        .slot-dot.filled {
            background: var(--gold-main); border-color: var(--gold-main);
            box-shadow: 0 0 4px rgba(207,169,114,0.4);
        }

        /* 對話滾動區域 */
        .scroll-area {
            flex: 1; overflow-y: auto; padding: 20px;
            scroll-behavior: smooth; position: relative; z-index: 2;
        }
        .scroll-area::-webkit-scrollbar { width: 0; }

        .hero-section { text-align: center; margin-bottom: 32px; padding-top: 8px; }
        .hero-section h2 { font-size: 18px; color: var(--gold-main); margin: 0 0 8px; font-weight: 500; letter-spacing: 1.5px; }
        .hero-section p { font-size: 12px; color: var(--text-sub); margin: 0; line-height: 1.6; letter-spacing: 0.5px; }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-container { display: flex; flex-direction: column; gap: 28px; }

        .chat-row {
            display: flex; flex-direction: column; width: 100%;
            animation: floatIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .chat-row.agent { align-items: flex-start; }
        .chat-row.user { align-items: flex-end; }

        .step-title {
            display: flex; align-items: center; gap: 8px;
            font-size: 11px; font-weight: 500; margin-bottom: 8px;
            letter-spacing: 0.8px; text-transform: uppercase;
        }
        .chat-row.agent .step-title { color: var(--pink-main); }
        .chat-row.user .step-title { color: var(--gold-main); flex-direction: row-reverse; }

        .title-dot { width: 6px; height: 6px; border-radius: 50%; }
        .chat-row.agent .title-dot { background-color: var(--pink-light); }
        .chat-row.user .title-dot { background-color: var(--gold-light); }

        /* 卡片 */
        .memory-card {
            background-color: var(--card-bg); border-radius: 12px;
            box-shadow: var(--shadow-soft);
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; gap: 8px;
            max-width: 85%; border: 1px solid rgba(240, 235, 225, 0.4);
        }

        .scent-color-bar { position: absolute; top: 0; bottom: 0; width: 4px; }
        .bar-agent { right: 0; background-color: var(--pink-light); }
        .bar-user { left: 0; background-color: var(--gold-light); }

        .agent-card { padding: 16px 20px 16px 16px; }
        .user-card { padding: 16px 16px 16px 20px; }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
        .memory-card h4 { margin: 0; font-size: 15px; color: var(--text-main); font-weight: 500; letter-spacing: 0.5px; }
        .advisor-tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; border: 1px solid var(--pink-light); color: var(--pink-main); background-color: #FFF; }

        .memory-card p {
            margin: 0; font-size: 13px; color: var(--text-sub);
            line-height: 1.7; white-space: pre-wrap;
        }

        /* 快速選項按鈕 */
        .options-group { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; }
        .option-btn {
            background: var(--bg-light); border: none;
            color: var(--text-main); padding: 10px 16px; border-radius: 12px;
            font-size: 12px; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 4px 4px 10px var(--neu-shadow-dark), -4px -4px 10px var(--neu-shadow-light);
            font-family: inherit; letter-spacing: 0.5px;
        }
        .option-btn:hover {
            box-shadow: inset 2px 2px 5px var(--neu-shadow-dark), inset -2px -2px 5px var(--neu-shadow-light);
            color: var(--pink-main); transform: scale(0.98);
        }

        /* 打字動畫 */
        .typing-indicator {
            display: flex; align-items: center; gap: 4px; padding: 4px 0;
        }
        .typing-indicator span {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--pink-main); opacity: 0.4;
            animation: typingBounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* 底部輸入區 */
        .input-area {
            padding: 20px; background-color: var(--card-bg);
            border-top: 1px solid rgba(240, 235, 225, 0.5);
            display: flex; gap: 12px; align-items: center; z-index: 10;
        }
        .input-area input {
            flex: 1; padding: 14px 18px; border: none; border-radius: 15px;
            outline: none; font-size: 13px; color: var(--text-main);
            background: var(--bg-light); font-family: inherit;
            box-shadow: inset 2px 2px 5px var(--neu-shadow-dark), inset -2px -2px 5px var(--neu-shadow-light);
        }
        .send-btn {
            background: var(--bg-light); border: none; cursor: pointer;
            color: var(--gold-main); display: flex; align-items: center; justify-content: center;
            width: 44px; height: 44px; border-radius: 12px;
            box-shadow: 4px 4px 10px var(--neu-shadow-dark), -4px -4px 10px var(--neu-shadow-light);
            transition: 0.3s; flex-shrink: 0;
        }
        .send-btn:hover { transform: translateY(-2px); color: var(--pink-main); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* 完成狀態 */
        .completed-banner {
            text-align: center; padding: 20px 16px;
            background: rgba(249,247,243,0.8);
            border-top: 1px solid rgba(240,235,225,0.5);
            z-index: 10;
        }
        .completed-banner p {
            font-size: 13px; color: var(--text-sub); margin: 0 0 12px; letter-spacing: 0.5px;
        }
        .restart-btn {
            background: var(--gold-main); border: none; color: #fff;
            padding: 10px 24px; border-radius: 10px; font-size: 13px;
            cursor: pointer; font-family: inherit; letter-spacing: 1px;
            transition: 0.3s;
        }
        .restart-btn:hover { opacity: 0.9; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="ambient-bg"></div>

    <div class="nav-bar">
        <button class="back-btn" id="backBtn">&#10094;</button>
        <h1 class="page-title">專屬選香顧問</h1>
    </div>

    <!-- 槽位進度 -->
    <div class="progress-bar-wrap" id="slotProgress">
        <div class="slot-indicator"><div class="slot-dot" id="slot-space"></div>空間</div>
        <div class="slot-indicator"><div class="slot-dot" id="slot-mood"></div>心情</div>
        <div class="slot-indicator"><div class="slot-dot" id="slot-preferences"></div>香調</div>
        <div class="slot-indicator"><div class="slot-dot" id="slot-dislikes"></div>地雷</div>
        <div class="slot-indicator"><div class="slot-dot" id="slot-occasion"></div>場合</div>
        <div class="slot-indicator"><div class="slot-dot" id="slot-health_conditions"></div>健康</div>
    </div>

    <div class="scroll-area" id="scrollArea">
        <div class="hero-section">
            <h2>煖意 ‧ 專屬選香顧問</h2>
            <p>靜心聆聽，為您尋覓契合靈魂的香氣</p>
        </div>
        <div class="chat-container" id="chatTimeline"></div>
    </div>

    <!-- 輸入區（active 狀態） -->
    <div class="input-area" id="inputArea">
        <input type="text" id="msgInput" placeholder="告訴 Honoka 您的心情或偏好...">
        <button class="send-btn" id="sendBtn" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>

    <!-- 完成狀態 -->
    <div class="completed-banner hidden" id="completedBanner">
        <p>很高興能幫您找到屬於您的氣息 ✨</p>
        <button class="restart-btn" id="restartBtn">開始新的諮詢</button>
    </div>
</div>

<script type="module">
    import liff from "https://cdn.jsdelivr.net/npm/@line/liff@2.23.2/+esm";

    // ── 常數 ──
    const SUPABASE_URL = 'https://kvqkjtyhbbcivwlexgcn.supabase.co';
    const API_ENDPOINT = `${SUPABASE_URL}/functions/v1/fragrance-advisor`;

    // ── 狀態 ──
    let userId = null;
    let sessionId = crypto.randomUUID();
    let chatStatus = 'active';
    let isLoading = false;

    // ── DOM ──
    const chatTimeline = document.getElementById('chatTimeline');
    const scrollArea = document.getElementById('scrollArea');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const inputArea = document.getElementById('inputArea');
    const completedBanner = document.getElementById('completedBanner');

    // ── 初始化 ──
    async function init() {
        try {
            await liff.init({ liffId: '2009177086-5AGq54Qb' });
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }
            const profile = await liff.getProfile();
            userId = profile.userId;
        } catch (err) {
            console.warn('LIFF init failed, using fallback userId', err);
            userId = localStorage.getItem('nuvayae_uid') || crypto.randomUUID();
            localStorage.setItem('nuvayae_uid', userId);
        }

        // 顯示歡迎訊息
        appendAgentMessage(
            '不知道這個月該選哪一款嗎？',
            '不管是「最近的心情」（例如：需要專注、想好好睡一覺），還是「偏好的氣味」（例如：喜歡沉穩木質、想找清新果香），請用簡單的幾個字告訴我。\n\n我會分析您的狀態與喜好，精準匹配出最適合您的氣味。',
            ['需要專注', '想要好眠', '沉穩木質', '清新花香']
        );

        scrollToBottom();
    }

    // ── API 呼叫 ──
    async function sendMessage(message) {
        const res = await fetch(API_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId, sessionId, message }),
        });

        if (!res.ok) {
            if (res.status === 409) throw new Error('SESSION_COMPLETED');
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || `HTTP ${res.status}`);
        }

        return res.json();
    }

    // ── 訊息渲染 ──
    function appendAgentMessage(title, text, quickReplies) {
        const row = document.createElement('div');
        row.className = 'chat-row agent';

        let html = `
            <div class="step-title">
                <div class="title-dot"></div>
                <span>煖意選香師｜Honoka</span>
            </div>
            <div class="memory-card agent-card">
                <div class="scent-color-bar bar-agent"></div>
                ${title ? `<h4 style="margin:0 0 6px;font-size:14px;font-weight:500;color:var(--text-main);letter-spacing:0.5px;">${title}</h4>` : ''}
                <p>${escapeHtml(text)}</p>
        `;

        if (quickReplies && quickReplies.length > 0) {
            html += '<div class="options-group">';
            quickReplies.forEach(label => {
                html += `<button class="option-btn" data-quick="${escapeHtml(label)}">${escapeHtml(label)}</button>`;
            });
            html += '</div>';
        }

        html += '</div>';
        row.innerHTML = html;
        chatTimeline.appendChild(row);

        // 快速選項事件
        row.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const text = btn.dataset.quick;
                // 隱藏此組選項
                btn.closest('.options-group').classList.add('hidden');
                handleSend(text);
            });
        });

        scrollToBottom();
    }

    function appendUserMessage(text) {
        const row = document.createElement('div');
        row.className = 'chat-row user';
        row.innerHTML = `
            <div class="step-title">
                <span>您</span>
                <div class="title-dot"></div>
            </div>
            <div class="memory-card user-card">
                <div class="scent-color-bar bar-user"></div>
                <p>${escapeHtml(text)}</p>
            </div>
        `;
        chatTimeline.appendChild(row);
        scrollToBottom();
    }

    function showTyping() {
        const row = document.createElement('div');
        row.className = 'chat-row agent';
        row.id = 'typingRow';
        row.innerHTML = `
            <div class="step-title">
                <div class="title-dot"></div>
                <span>煖意選香師｜Honoka</span>
            </div>
            <div class="memory-card agent-card">
                <div class="scent-color-bar bar-agent"></div>
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            </div>
        `;
        chatTimeline.appendChild(row);
        scrollToBottom();
    }

    function removeTyping() {
        const el = document.getElementById('typingRow');
        if (el) el.remove();
    }

    // ── 槽位更新 ──
    function updateSlots(state) {
        if (!state) return;
        const slots = {
            space: state.space,
            mood: state.mood,
            preferences: state.preferences && state.preferences.length > 0 ? 'filled' : null,
            dislikes: state.dislikes && state.dislikes.length > 0 ? 'filled' : null,
            occasion: state.occasion,
            health_conditions: state.health_conditions && state.health_conditions.length > 0 ? 'filled' : null,
        };
        Object.entries(slots).forEach(([key, val]) => {
            const dot = document.getElementById(`slot-${key}`);
            if (dot) dot.classList.toggle('filled', !!val);
        });
    }

    // ── 送出處理 ──
    async function handleSend(text) {
        if (!text || !text.trim() || isLoading || chatStatus === 'completed') return;
        text = text.trim();

        isLoading = true;
        sendBtn.disabled = true;

        appendUserMessage(text);
        showTyping();

        try {
            const res = await sendMessage(text);
            removeTyping();
            appendAgentMessage(null, res.reply);
            updateSlots(res.state);

            if (res.status === 'completed') {
                chatStatus = 'completed';
                inputArea.classList.add('hidden');
                completedBanner.classList.remove('hidden');
            }
        } catch (err) {
            removeTyping();
            if (err.message === 'SESSION_COMPLETED') {
                chatStatus = 'completed';
                inputArea.classList.add('hidden');
                completedBanner.classList.remove('hidden');
                appendAgentMessage(null, '此次諮詢已完成，感謝您的信任。');
            } else {
                appendAgentMessage(null, '系統暫時無法回應，請稍後再試。');
            }
        } finally {
            isLoading = false;
            sendBtn.disabled = false;
            msgInput.value = '';
        }
    }

    // ── 工具 ──
    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function scrollToBottom() {
        requestAnimationFrame(() => {
            scrollArea.scrollTop = scrollArea.scrollHeight;
        });
    }

    // ── 事件 ──
    sendBtn.addEventListener('click', () => handleSend(msgInput.value));
    msgInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.isComposing) {
            e.preventDefault();
            handleSend(msgInput.value);
        }
    });

    document.getElementById('backBtn').addEventListener('click', () => {
        if (window.history.length > 1) {
            window.history.back();
        } else {
            window.location.href = './index.html';
        }
    });

    document.getElementById('restartBtn').addEventListener('click', () => {
        sessionId = crypto.randomUUID();
        chatStatus = 'active';
        chatTimeline.innerHTML = '';
        completedBanner.classList.add('hidden');
        inputArea.classList.remove('hidden');
        // 重置槽位
        document.querySelectorAll('.slot-dot').forEach(d => d.classList.remove('filled'));
        // 重新顯示歡迎訊息
        appendAgentMessage(
            '不知道這個月該選哪一款嗎？',
            '不管是「最近的心情」（例如：需要專注、想好好睡一覺），還是「偏好的氣味」（例如：喜歡沉穩木質、想找清新果香），請用簡單的幾個字告訴我。\n\n我會分析您的狀態與喜好，精準匹配出最適合您的氣味。',
            ['需要專注', '想要好眠', '沉穩木質', '清新花香']
        );
    });

    init();
</script>
</body>
</html>
