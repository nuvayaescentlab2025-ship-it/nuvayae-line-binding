<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+TC:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
      /* ── 香氛年曆 ── */
      #yearCalendar { margin-top: 24px; width: 100%; }

      .cal-section-label {
        font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase;
        color: #7a6b58; text-align: center; margin-bottom: 16px;
      }

      .cal-timeline-container {
        position: relative; padding: 44px 0 20px; overflow-x: auto;
      }

      .cal-timeline-container::before {
        content: '';
        position: absolute; top: 50%; left: 10px; right: 10px; height: 1px;
        background: linear-gradient(90deg,
          transparent 0%, rgba(190,159,116,0.25) 8%,
          rgba(190,159,116,0.55) 30%, rgba(190,159,116,0.65) 50%,
          rgba(190,159,116,0.55) 70%, rgba(190,159,116,0.25) 92%, transparent 100%);
        transform: translateY(-50%);
      }

      .cal-timeline-track {
        display: flex; justify-content: space-between; align-items: center;
        position: relative; min-width: 360px;
      }

      .cal-month-node {
        display: flex; flex-direction: column; align-items: center; gap: 8px;
        cursor: pointer; position: relative; padding-top: 16px;
      }

      .cal-season-icon {
        position: absolute; top: 0; left: 50%; transform: translateX(-50%);
        font-size: 12px; animation: calFloatUp 2.5s ease-in-out infinite;
        filter: drop-shadow(0 0 5px rgba(201,169,110,0.4));
      }

      .cal-month-dot {
        width: 7px; height: 7px; border-radius: 50%;
        background: transparent; border: 1.5px solid rgba(160,140,110,0.45);
        transition: all 0.35s ease; position: relative; flex-shrink: 0;
      }

      .cal-month-node.past .cal-month-dot {
        background: rgba(190,159,116,0.65); border-color: rgba(190,159,116,0.85);
      }
      .cal-month-node.current .cal-month-dot {
        width: 13px; height: 13px; background: #c9a96e; border-color: #c9a96e;
        box-shadow: 0 0 10px rgba(201,169,110,0.7), 0 0 22px rgba(201,169,110,0.3);
        animation: calCurrentPulse 2s ease-in-out infinite;
      }
      .cal-month-node.current .cal-month-dot::after {
        content: ''; position: absolute; inset: -6px; border-radius: 50%;
        border: 1px solid rgba(201,169,110,0.35);
        animation: calRingExpand 2s ease-in-out infinite;
      }
      .cal-month-node.seasonal .cal-month-dot {
        background: rgba(210,170,70,0.7); border-color: #c9a96e;
        width: 10px; height: 10px;
        box-shadow: 0 0 6px rgba(201,169,110,0.5);
        animation: calSeasonGlow 2.8s ease-in-out infinite;
      }
      .cal-month-node.current.seasonal .cal-month-dot {
        width: 13px; height: 13px; background: #c9a96e;
        animation: calCurrentPulse 2s ease-in-out infinite;
      }
      .cal-month-node:not(.current):hover .cal-month-dot {
        background: rgba(201,169,110,0.6); border-color: #c9a96e;
        transform: scale(1.3);
      }

      .cal-month-label {
        font-size: 9px; letter-spacing: 0.06em; color: #9a8c7e; transition: color 0.3s;
      }
      .cal-month-node.past .cal-month-label    { color: #a07840; }
      .cal-month-node.current .cal-month-label  { color: #b8893e; font-weight: 600; }
      .cal-month-node.seasonal:not(.current) .cal-month-label { color: #9a7030; }
      .cal-month-node:not(.current):hover .cal-month-label { color: #b8893e; }

      .cal-tooltip {
        position: absolute; bottom: calc(100% + 8px); left: 50%;
        transform: translateX(-50%) translateY(4px);
        background: rgba(45,35,24,0.97); border: 1px solid rgba(201,169,110,0.2);
        color: #e8d5a3; font-size: 9px; letter-spacing: 0.1em;
        padding: 5px 8px; white-space: nowrap; border-radius: 1px;
        opacity: 0; pointer-events: none;
        transition: opacity 0.25s ease, transform 0.25s ease; z-index: 10;
      }
      .cal-tooltip::after {
        content: ''; position: absolute; top: 100%; left: 50%;
        transform: translateX(-50%);
        border: 4px solid transparent; border-top-color: rgba(201,169,110,0.2);
      }
      .cal-month-node:hover .cal-tooltip { opacity: 1; transform: translateX(-50%) translateY(0); }

      .cal-month-node.start-month .cal-month-dot {
        border-color: #c9a96e;
      }
      .cal-month-node.start-month .cal-month-dot::before {
        content: ''; position: absolute; inset: -5px; border-radius: 50%;
        border: 1px dashed rgba(201,169,110,0.5);
        animation: calStartRotate 8s linear infinite;
      }

      .cal-start-flag {
        position: absolute; bottom: calc(100% + 8px); left: 50%;
        transform: translateX(-50%);
        display: flex; flex-direction: column; align-items: center; gap: 3px;
        pointer-events: none; z-index: 5;
        animation: calFadeInFlag 1s 0.5s ease both;
      }
      .cal-start-flag-label {
        background: rgba(45,35,24,0.95); border: 1px solid rgba(201,169,110,0.35);
        color: #c9a96e; font-size: 8px; letter-spacing: 0.15em;
        padding: 3px 6px; white-space: nowrap; border-radius: 1px;
      }
      .cal-start-flag-line {
        width: 1px; height: 8px;
        background: linear-gradient(to bottom, rgba(201,169,110,0.4), transparent);
      }

      .cal-legend {
        display: flex; justify-content: center; gap: 14px;
        margin-top: 20px; flex-wrap: wrap;
      }
      .cal-legend-item {
        display: flex; align-items: center; gap: 6px;
        font-size: 9px; letter-spacing: 0.1em; color: #7a6b58;
      }
      .cal-legend-dot {
        width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
      }
      .cal-legend-dot.past     { background: rgba(190,159,116,0.65); border: 1px solid rgba(190,159,116,0.85); }
      .cal-legend-dot.current  { background: #c9a96e; box-shadow: 0 0 8px rgba(201,169,110,0.6); }
      .cal-legend-dot.seasonal { background: rgba(210,170,70,0.7); border: 1px solid #c9a96e; box-shadow: 0 0 5px rgba(201,169,110,0.4); }
      .cal-legend-dot.future   { background: transparent; border: 1.5px solid rgba(160,140,110,0.45); }
      .cal-legend-dot.start-dot { background: transparent; border: 1.5px solid #c9a96e; position: relative; }
      .cal-legend-dot.start-dot::after {
        content: ''; position: absolute; top: 50%; left: 50%;
        width: 3px; height: 3px; background: #c9a96e; border-radius: 50%;
        transform: translate(-50%,-50%);
      }

      @keyframes calFloatUp {
        0%,100% { transform: translateX(-50%) translateY(0); }
        50%      { transform: translateX(-50%) translateY(-4px); }
      }
      @keyframes calCurrentPulse {
        0%,100% { box-shadow: 0 0 10px rgba(201,169,110,0.7), 0 0 22px rgba(201,169,110,0.3); }
        50%     { box-shadow: 0 0 16px rgba(201,169,110,0.9), 0 0 36px rgba(201,169,110,0.4); }
      }
      @keyframes calRingExpand {
        0%,100% { opacity: 0.4; transform: scale(1); }
        50%     { opacity: 0.15; transform: scale(1.4); }
      }
      @keyframes calSeasonGlow {
        0%,100% { box-shadow: 0 0 5px rgba(201,169,110,0.45); }
        50%     { box-shadow: 0 0 14px rgba(201,169,110,0.8); }
      }
      @keyframes calStartRotate {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes calFadeInFlag {
        from { opacity: 0; transform: translateX(-50%) translateY(6px); }
        to   { opacity: 1; transform: translateX(-50%) translateY(0); }
      }

      /* ── 選香區塊 ── */
      #scentPicker { margin-top: 28px; width: 100%; }

      .scent-section-label {
        font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase;
        color: #7a6b58; text-align: center; margin-bottom: 16px;
      }

      .scent-cards {
        display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
      }

      .scent-card {
        flex: 1 1 90px; max-width: 120px;
        display: flex; flex-direction: column; align-items: center; gap: 8px;
        background: rgba(30,22,14,0.55);
        border: 1px solid rgba(190,159,116,0.18);
        border-radius: 2px; padding: 10px 8px 12px;
        transition: border-color 0.3s, transform 0.3s;
        text-decoration: none;
      }
      .scent-card:hover {
        border-color: rgba(201,169,110,0.55);
        transform: translateY(-3px);
      }

      .scent-card img {
        width: 100%; aspect-ratio: 1/1; object-fit: cover;
        border-radius: 1px; display: block;
      }

      .scent-card-name {
        font-size: 10px; letter-spacing: 0.08em; color: #c9a96e;
        text-align: center; line-height: 1.5;
      }
      .scent-card-name span {
        display: block; font-size: 8px; letter-spacing: 0.12em;
        color: #7a6b58; margin-top: 2px;
      }

      .scent-card-btn {
        font-size: 8px; letter-spacing: 0.15em; color: #a07840;
        border: 1px solid rgba(190,159,116,0.35); padding: 3px 8px;
        border-radius: 1px;
      }
      .scent-card:hover .scent-card-btn {
        color: #c9a96e; border-color: rgba(201,169,110,0.6);
      }
    </style>
