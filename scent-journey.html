<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>煖意 - 香氛記憶 (動態文案最終版)</title>
    <style>
        :root {
            --bg-light: #F9F7F3; 
            --card-bg: #FFFFFF; 
            --text-main: #4A4238; 
            --text-sub: #8C8273; 
            --gold-main: #CFA972; 
            --gold-light: #EBE1D1; 
            --shadow: 0 4px 12px rgba(74, 66, 56, 0.05); 
            --border-soft: #F0EBE1; 
        }

        body {
            margin: 0; padding: 20px; background-color: #EAE6DF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text-main); display: flex; justify-content: center;
        }

        .app-container {
            width: 100%; max-width: 400px; background-color: var(--bg-light);
            min-height: 100vh; padding: 0 0 40px 0; box-sizing: border-box;
            position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border-radius: 24px; overflow: hidden;
        }

        /* 頂部導覽列 */
        .nav-bar {
            display: flex; align-items: center; padding: 20px;
            background-color: rgba(249, 247, 243, 0.95); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border-soft);
        }
        .back-btn { font-size: 16px; color: var(--gold-main); text-decoration: none; margin-right: 16px; display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; background: #FFF; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .page-title { font-size: 15px; font-weight: 500; color: var(--text-main); margin: 0; letter-spacing: 1px; }

        .hero-section { padding: 24px 20px 16px 20px; text-align: center; }
        .hero-section h2 { font-size: 20px; color: var(--gold-main); margin: 0 0 6px 0; font-weight: 500; letter-spacing: 1px; }
        .hero-section p { font-size: 12px; color: var(--text-sub); margin: 0; line-height: 1.5; }

        /* 時間軸設計 */
        .timeline-container { padding: 0 20px; position: relative; margin-top: 10px; }
        .timeline-container::before { content: ''; position: absolute; left: 26px; top: 10px; bottom: 10px; width: 1px; background: dashed 1px var(--gold-light); }

        .history-item { position: relative; padding-left: 32px; margin-bottom: 28px; }
        
        .timeline-dot {
            position: absolute; left: 3px; top: 4px; width: 10px; height: 10px;
            border-radius: 50%; background-color: var(--card-bg); border: 2px solid var(--gold-light); z-index: 2;
        }

        .history-date { font-size: 12px; font-weight: 500; color: var(--gold-main); margin-bottom: 10px; letter-spacing: 0.5px; display: flex; justify-content: space-between; align-items: center;}
        .history-date span:last-child { color: var(--text-sub); font-size: 11px; font-weight: 400;}

        /* 四季專屬禮贈區塊 */
        .milestone-gift {
            background: var(--card-bg); border: 1px solid var(--border-soft);
            border-radius: 10px; padding: 12px 14px 12px 16px;
            margin-bottom: 12px; display: flex; align-items: center; gap: 12px;
            box-shadow: var(--shadow); position: relative; overflow: hidden;
        }
        
        /* 四季色彩設定 */
        .color-spring { background-color: #FFB7C5; } /* 櫻花粉 */
        
        .milestone-gift .gift-icon { font-size: 18px; }
        .milestone-gift .gift-text { display: flex; flex-direction: column; gap: 2px; }
        .milestone-gift .gift-text strong { font-size: 13px; color: var(--text-main); font-weight: 500;}
        .milestone-gift .gift-text span { font-size: 11px; color: var(--text-sub); }

        /* 記憶卡片 */
        .memory-card {
            background-color: var(--card-bg); border-radius: 10px;
            padding: 14px 14px 14px 16px; 
            box-shadow: var(--shadow); border: 1px solid var(--border-soft);
            position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 6px;
        }
        
        /* 🌿 精油專屬色塊 */
        .scent-color-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
        .color-yehe { background-color: #D6CADD; } 
        .color-chaoguang { background-color: #D0E5D2; } 
        .color-nuanju { background-color: #F4D5A6; } 

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;}
        .memory-card h4 { margin: 0; font-size: 15px; color: var(--text-main); font-weight: 500; letter-spacing: 0.5px;}
        .scent-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border-soft); color: var(--text-sub); }
        
        /* 動態文案 */
        .memory-card p { margin: 0; font-size: 12px; color: var(--text-sub); line-height: 1.5; }

        .end-mark { text-align: center; color: var(--gold-light); font-size: 20px; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="nav-bar">
            <a href="#" class="back-btn">❮</a>
            <h1 class="page-title">香氛記憶</h1>
        </div>

        <div class="hero-section">
            <h2>煖意 ‧ 氣味旅程</h2>
            <p>每一縷氣味，都是生活的碎片</p>
        </div>

        <div class="timeline-container">
            
            <div class="history-item">
                <div class="timeline-dot"></div>
                <div class="history-date"><span>2026.03</span> <span>第 3 個月</span></div>
                
                <div class="milestone-gift">
                    <div class="scent-color-bar color-spring"></div>
                    <div class="gift-icon">🌸</div>
                    <div class="gift-text">
                        <strong>春季專屬禮贈</strong>
                        <span>迎接春日，為您送上專屬的季禮心意。</span>
                    </div>
                </div>

                <div class="memory-card">
                    <div class="scent-color-bar color-chaoguang"></div>
                    <div class="card-header">
                        <h4>朝光</h4>
                        <div class="scent-tag">經典系列</div>
                    </div>
                    <p>冷冽森林木質調。<br>如同漫步在清晨沾滿露水的杉林，帶來煥然一新的澄澈生機。</p>
                </div>
            </div>

            <div class="history-item">
                <div class="timeline-dot"></div>
                <div class="history-date"><span>2026.02</span> <span>第 2 個月</span></div>
                <div class="memory-card">
                    <div class="scent-color-bar color-yehe"></div>
                    <div class="card-header">
                        <h4>夜和</h4>
                        <div class="scent-tag">經典系列</div>
                    </div>
                    <p>寧靜草本木質調。<br>化作一條鬆軟的無形毛毯，溫柔包裹住生活的疲憊，給予月色般的擁抱。</p>
                </div>
            </div>

            <div class="history-item">
                <div class="timeline-dot"></div>
                <div class="history-date"><span>2026.01</span> <span>第 1 個月</span></div>
                <div class="memory-card">
                    <div class="scent-color-bar color-nuanju"></div>
                    <div class="card-header">
                        <h4>暖居</h4>
                        <div class="scent-tag">經典系列</div>
                    </div>
                    <p>溫暖果香木質調。<br>點亮一盞冬日裡的暖光，將所有的寒意與不安溫柔地隔絕在外。</p>
                </div>
            </div>

        </div>

        <div class="end-mark">❦</div>

    </div>

</body>
</html>
