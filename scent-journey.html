<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>煖意 ‧ 氣味旅程</title>
    <style>
        :root {
            --bg-light: #F9F7F3;
            --card-bg: #FFFFFF;
            --text-main: #4A4238;
            --text-sub: #8C8273;
            --gold-main: #CFA972;
            --gold-light: #EBE1D1;
            --shadow: 0 4px 12px rgba(74, 66, 56, 0.05);
            --border-soft: #F0EBE1;
        }

        body {
            margin: 0; padding: 20px; background-color: #EAE6DF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text-main); display: flex; justify-content: center;
        }

        .app-container {
            width: 100%; max-width: 400px; background-color: var(--bg-light);
            min-height: 100vh; padding: 0 0 40px 0; box-sizing: border-box;
            position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border-radius: 24px; overflow: hidden;
        }

        .nav-bar {
            display: flex; align-items: center; padding: 20px;
            background-color: rgba(249, 247, 243, 0.95); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border-soft);
        }
        .back-btn {
            font-size: 16px; color: var(--gold-main); text-decoration: none;
            margin-right: 16px; display: flex; align-items: center; justify-content: center;
            width: 28px; height: 28px; border-radius: 50%; background: #FFF;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer;
        }
        .page-title { font-size: 15px; font-weight: 500; color: var(--text-main); margin: 0; letter-spacing: 1px; }

        .hero-section { padding: 24px 20px 16px 20px; text-align: center; }
        .hero-section h2 { font-size: 20px; color: var(--gold-main); margin: 0 0 6px 0; font-weight: 500; letter-spacing: 1px; }
        .hero-section p { font-size: 12px; color: var(--text-sub); margin: 0; line-height: 1.5; }

        .timeline-container { padding: 0 20px; position: relative; margin-top: 10px; }
        .timeline-container::before {
            content: ''; position: absolute; left: 26px; top: 10px; bottom: 10px;
            width: 1px; border-left: 1px dashed var(--gold-light);
        }

        .history-item { position: relative; padding-left: 32px; margin-bottom: 28px; }

        .timeline-dot {
            position: absolute; left: 3px; top: 4px; width: 10px; height: 10px;
            border-radius: 50%; background-color: var(--card-bg); border: 2px solid var(--gold-light); z-index: 2;
        }
        .timeline-dot.active {
            border-color: var(--gold-main);
            background: var(--gold-main);
            box-shadow: 0 0 0 3px rgba(207,169,114,0.2);
        }

        .history-date {
            font-size: 12px; font-weight: 500; color: var(--gold-main);
            margin-bottom: 10px; letter-spacing: 0.5px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .history-date span:last-child { color: var(--text-sub); font-size: 11px; font-weight: 400; }

        .milestone-gift {
            background: var(--card-bg); border: 1px solid var(--border-soft);
            border-radius: 10px; padding: 12px 14px 12px 16px;
            margin-bottom: 12px; display: flex; align-items: center; gap: 12px;
            box-shadow: var(--shadow); position: relative; overflow: hidden;
        }
        .milestone-gift .gift-icon { font-size: 18px; }
        .milestone-gift .gift-text { display: flex; flex-direction: column; gap: 2px; }
        .milestone-gift .gift-text strong { font-size: 13px; color: var(--text-main); font-weight: 500; }
        .milestone-gift .gift-text span { font-size: 11px; color: var(--text-sub); }

        .memory-card {
            background-color: var(--card-bg); border-radius: 10px;
            padding: 14px 14px 14px 16px;
            box-shadow: var(--shadow); border: 1px solid var(--border-soft);
            position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 6px;
        }
        .memory-card.unknown { opacity: 0.45; }

        .scent-color-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .memory-card h4 { margin: 0; font-size: 15px; color: var(--text-main); font-weight: 500; letter-spacing: 0.5px; }
        .scent-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border-soft); color: var(--text-sub); }
        .memory-card p { margin: 0; font-size: 12px; color: var(--text-sub); line-height: 1.5; }

        .status-msg { text-align: center; padding: 48px 20px; font-size: 13px; color: var(--text-sub); line-height: 1.8; }

        .end-mark { text-align: center; color: var(--gold-light); font-size: 20px; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="nav-bar">
            <a class="back-btn" id="backBtn">❮</a>
            <h1 class="page-title">氣味旅程</h1>
        </div>
        <div class="hero-section">
            <h2>煖意 ‧ 氣味旅程</h2>
            <p>每一縷氣味，都是生活的碎片</p>
        </div>
        <div class="timeline-container" id="timeline">
            <p class="status-msg">正在讀取您的香氛記憶⋯</p>
        </div>
        <div class="end-mark" id="endMark" style="display:none">❦</div>
    </div>

    <script>
        const API_URL = 'https://kvqkjtyhbbcivwlexgcn.supabase.co/functions/v1/member';

        const SCENT_STYLES = {
            '朝光': { barColor: '#D0E5D2', desc: {
                1:  '新年新希望太沉重。早晨這抹清冽，允許笨拙的你只專注於今天。',
                2:  '殘冬晨風刺骨。這陣柚香像個小奇蹟，溫柔喚醒你凍僵的心。',
                3:  '春暖花開令人疲憊。吸一口清冷檜木香，給自己重新開始的勇氣。',
                4:  '梅雨早晨總有些氣餒。這抹透亮冷香，悄悄斬斷昨日的懊悔。',
                5:  '初夏陽光有些刺眼。躲進薄荷的微涼裡，享受一杯咖啡時間的清明。',
                6:  '悶濕早晨讓人喘不過氣。這陣俐落清風，溫柔梳理你糾結的思緒。',
                7:  '盛夏晨光太喧囂。這股純粹的澄淨，是你逃離世界的一方小小綠洲。',
                8:  '就算又是一事無成的早晨也沒關係。清冽冷香會陪你慢慢找回焦距。',
                9:  '初秋微涼。伴著這股毫無雜質的香氣，把夏日的遺憾輕輕放下吧。',
                10: '萬聖節的熱鬧與你無關。晨露般的清冷，溫柔接納你的格格不入。',
                11: '枯燥晨間毫無指望。深吸一口冷香，給自己一個面對今天的奇蹟。',
                12: '年終結算總讓人焦慮。這抹清冽如初雪，輕輕覆蓋你這一年的疲憊。',
            }},
            '暖居': { barColor: '#F4D5A6', desc: {
                1:  '新年鞭炮聲太吵？推開門，這股柑橘暖香是你專屬的溫柔避難所。',
                2:  '情人節街頭太擁擠。躲進甜暖木香裡，這裡允許你什麼都不做。',
                3:  '乍暖還寒的夜。滿身疲憊回到家，這微光般的暖意會悄悄接住你。',
                4:  '春雨連綿讓人發霉。這抹陽光般的甜香，溫柔烘乾你濕漉漉的心。',
                5:  '外界充滿生機卻讓你退縮？沒關係，窩在這股暖香裡當個逃兵吧。',
                6:  '覺得半年來一無所獲？推開家門，這股安定暖流依然溫柔擁抱你。',
                7:  '盛夏蟬鳴令人煩躁。躲進這片甜暖光影中，安心地大哭一場吧。',
                8:  '炎夏午後太過喧嘩。這股溫暖木質香，為你撐起一把隔絕惡意的傘。',
                9:  '秋風起，不想面對世界就逃吧。這股暖香會溫柔捂熱你膽怯的心。',
                10: '連假的喧鬧讓人疲倦。窩在木地板的暖意裡，享受孤獨的自由。',
                11: '初冬微寒。帶著傷痕回家也無妨，這抹甜香會像老朋友般接納你。',
                12: '聖誕燈火太刺眼。躲進這份溫暖的縮影裡，等心慢慢回溫就好了。',
            }},
            '日暮': { barColor: '#C8977B', desc: {
                1:  '寒冬日落得早。點起煙燻柴香，告訴自己：今天努力活著就夠了。',
                2:  '開工的疲倦讓人無力。落日柴燒味接住下墜的你，原諒你的不完美。',
                3:  '春暮微涼。讓這厚實的岩蘭草香，溫柔掩埋你今天跌跌撞撞的委屈。',
                4:  '傍晚雨天總帶著惆悵。這抹煙燻木香，給你一個原諒昨日的奇蹟。',
                5:  '暮春傍晚讓人迷茫。在萬家燈火的甜香裡，給自己一杯茶的停頓。',
                6:  '悶熱黃昏。即便今天充滿挫敗，這沉穩氣息也會溫柔接住你的無力。',
                7:  '夏日向晚。望著魔幻落日，讓煙燻香氣洗去你白日裡的百般討好。',
                8:  '炎夏夕陽如火。被生活擊潰也沒關係，厚實木香會陪你靜靜等候。',
                9:  '中秋團圓反而顯得孤單。這股溫潤的柴燒味，是你最安穩的陪伴。',
                10: '秋夕短暫。趁天黑前，讓這下沉的煙燻香氣，輕輕撫平白日的傷痕。',
                11: '晚秋傍晚滿是蕭瑟。跌倒了也沒關係，這厚實依靠會穩住你的徬徨。',
                12: '年末黃昏總帶點遺憾。在這落日煙燻中，溫柔擁抱無能為力的自己。',
            }},
            '夜和': { barColor: '#D6CADD', desc: {
                1:  '寒夜難眠。當懊悔在黑夜擴散，這抹草本香是一床溫暖你的毛毯。',
                2:  '節慶對比著你的孤單。佛寺般的幽香，溫柔收留你無處安放的脆弱。',
                3:  '春夜多夢。腦袋停不下來時，這微涼香氣會帶你逃回最安全的記憶。',
                4:  '雨夜焦慮蔓延。覺得糟透了也沒關係，這股木香會溫柔掩蓋雜訊。',
                5:  '悶熱的夜。如果對明天感到恐懼，就躲進薰衣草的鬆軟裡待機吧。',
                6:  '夏夜心浮氣躁。這股冷卻思緒的幽香，是今晚專屬於你的避風港。',
                7:  '暑夜難熬。就算世界再喧鬧，這抹微風般的香氣答應你今晚有好夢。',
                8:  '鬼月的夜總有些不安。這安定木香如時光機，帶你回到無憂的過去。',
                9:  '秋夜微涼。別怕腦海裡的自我否定，讓這草本香溫柔擁抱你的碎裂。',
                10: '長夜漫漫。這股跨越時空的沉靜，允許你安心地對這個世界說晚安。',
                11: '初冬夜深。過去無法改變，但在這抹佛寺幽香裡，你可以安靜休息。',
                12: '跨年狂歡與你無關。這靜心冷香會溫柔包覆你，什麼都不想好好睡吧。',
            }},
        };

        // 季禮月：依曆月（3=春、6=夏、9=秋、12=冬）
        const SEASON_GIFTS = {
            3:  { icon: '🌸', label: '春之獻禮', desc: '春光如吻，溫柔接住所有不安。',   barColor: '#FFB7C5' },
            6:  { icon: '🍧', label: '夏之獻禮', desc: '盛夏喧囂，予你一處清涼奇蹟。',   barColor: '#AEE3E8' },
            9:  { icon: '🍂', label: '秋之獻禮', desc: '秋風微涼，溫柔包容你的疲憊。',   barColor: '#E8C49A' },
            12: { icon: '❄️', label: '冬之獻禮', desc: '漫長冬夜，化作最溫暖的擁抱。',   barColor: '#C5D5E8' },
        };

        document.getElementById('backBtn').addEventListener('click', () => history.back());

        function buildItems(result) {
            return result.history || [];
        }

        function renderItem(item) {
            const { year, month, monthIndex, perfumeName, isCurrent } = item;
            const dateLabel = `${year}.${String(month).padStart(2, '0')}`;
            const season = SEASON_GIFTS[month];
            const scentKey = perfumeName ? (Object.keys(SCENT_STYLES).find(k => perfumeName === k || perfumeName.startsWith(k)) || perfumeName) : null;
            const style  = scentKey ? SCENT_STYLES[scentKey] : null;
            const dotClass = isCurrent ? 'timeline-dot active' : 'timeline-dot';

            let html = `
                <div class="history-item">
                    <div class="${dotClass}"></div>
                    <div class="history-date">
                        <span>${dateLabel}</span>
                        <span>第 ${monthIndex} 個月${isCurrent ? ' · 本月' : ''}</span>
                    </div>`;

            if (season) {
                html += `
                    <div class="milestone-gift">
                        <div class="scent-color-bar" style="background:${season.barColor}"></div>
                        <div class="gift-icon">${season.icon}</div>
                        <div class="gift-text">
                            <strong>${season.label}</strong>
                            <span>${season.desc}</span>
                        </div>
                    </div>`;
            }

            if (perfumeName) {
                const barColor = style ? style.barColor : '#DDD';
                const desc     = style ? (typeof style.desc === 'object' ? style.desc[month] : style.desc) || '' : '';
                html += `
                    <div class="memory-card">
                        <div class="scent-color-bar" style="background:${barColor}"></div>
                        <div class="card-header">
                            <h4>${perfumeName}</h4>
                            <div class="scent-tag">經典系列</div>
                        </div>
                        ${desc ? `<p>${desc}</p>` : ''}
                    </div>`;
            } else {
                html += `
                    <div class="memory-card unknown">
                        <div class="scent-color-bar" style="background:#DDD"></div>
                        <div class="card-header"><h4>—</h4></div>
                        <p>香氛記憶整理中</p>
                    </div>`;
            }

            html += `</div>`;
            return html;
        }

        async function loadJourney() {
            const userId  = new URLSearchParams(location.search).get('userid');
            const timeline = document.getElementById('timeline');

            if (!userId) {
                timeline.innerHTML = '<p class="status-msg">無法取得會員資訊，<br>請返回重試。</p>';
                return;
            }

            try {
                const res    = await fetch(`${API_URL}?action=check_bound&userid=${encodeURIComponent(userId)}`);
                const result = await res.json();

                if (!result.isBound) {
                    timeline.innerHTML = '<p class="status-msg">查無訂閱記錄。</p>';
                    return;
                }

                const items = buildItems(result);
                if (!items.length) {
                    timeline.innerHTML = '<p class="status-msg">尚無選香記錄。</p>';
                    return;
                }
                timeline.innerHTML = items.map(renderItem).join('');
                document.getElementById('endMark').style.display = 'block';
            } catch (e) {
                timeline.innerHTML = '<p class="status-msg">載入失敗，請稍後再試。</p>';
            }
        }

        loadJourney();
    </script>
</body>
</html>
